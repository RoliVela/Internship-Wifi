<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Toyota Wi-Fi Connect</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #0a0a0a;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
            font-size: 19px;
        }
        .card {
            background: #141414;
            padding: 40px 30px;
            border-radius: 16px;
            border: 1px solid #262626;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            text-align: center;
            max-width: 400px;
            width: 100%;
        }
        .logo-container {
            margin-bottom: 25px;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .logo-image {
            width: 150px;
            height: auto;
            object-fit: contain;
        }
        h2 {
            margin-top: 0;
            color: #ffffff;
            font-size: 25px;
            font-weight: 700;
            letter-spacing: -0.5px;
        }
        .instructions {
            color: #a3a3a3;
            font-size: 20px;
            line-height: 1.6;
            margin-bottom: 28px;
        }
        .network-highlight {
            color: #ffffff;
            font-weight: 600;
            white-space: nowrap;
        }
        .btn {
            background-color: #eb0a1e;
            color: white;
            border: none;
            padding: 16px 28px;
            font-size: 19px;
            font-weight: 600;
            border-radius: 8px;
            cursor: pointer;
            width: 100%;
            transition: background-color 0.2s ease, transform 0.1s ease;
            box-sizing: border-box;
        }
        .btn:hover {
            background-color: #cc081a;
        }
        .btn:active {
            transform: scale(0.98);
        }
        
        .btn-secondary {
            background-color: transparent;
            color: #a3a3a3;
            border: 1px solid #404040;
            padding: 12px 24px;
            font-size: 15px;
            font-weight: 500;
            border-radius: 8px;
            cursor: pointer;
            width: 100%;
            margin-top: 16px;
            transition: all 0.2s ease;
            text-decoration: none;
            display: inline-block;
            box-sizing: border-box;
        }
        .btn-secondary:hover {
            color: #ffffff;
            border-color: #eb0a1e;
            background-color: rgba(235, 10, 30, 0.05);
        }
        .btn-secondary:active {
            transform: scale(0.98);
        }

        .success-msg {
            color: #34c759;
            font-size: 17px;
            margin-top: 16px;
            display: none;
            font-weight: 500;
            animation: fadeIn 0.3s ease;
        }
        
        .counter-text {
            color: #525252;
            font-size: 13px;
            margin-top: 24px;
            letter-spacing: 0.5px;
            text-transform: uppercase;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-5px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

    <div class="card">
        <div class="logo-container">
            <img src="ToyotaLogo.png" alt="Toyota Logo" class="logo-image">
        </div>

        <h2>Welcome to Toyota</h2>
        <p class="instructions">Tap the button below to copy the password, then connect to the <span class="network-highlight">Toyota Guest</span> network in your settings.</p>
        
        <button class="btn" onclick="copyPassword()">Copy Wi-Fi Password</button>
        <div id="success" class="success-msg">Password copied! Paste into settings.</div>

        <a href="https://search.google.com/local/writereview?placeid=ChIJX7xWHNYmYYYRICQxaGLEEYM" target="_blank" class="btn-secondary">
            Rate us on Google
        </a>

        <div class="counter-text">
            Total Portal Connections: <span id="visits">1</span>
        </div>
    </div>

    <script>
        function copyPassword() {
            const password = "Toyota2022"; 
            
            navigator.clipboard.writeText(password).then(() => {
                const successDiv = document.getElementById('success');
                successDiv.style.display = 'block';
                
                setTimeout(() => {
                    successDiv.style.display = 'none';
                }, 4000);
            }).catch(err => {
                alert('Oops, unable to copy automatically. Please type it manually.');
            });
        }

        // Native, zero-dependency endpoint hit counter implementation
        document.addEventListener('DOMContentLoaded', function() {
            // Using a unique namespace key for tracking deployment metrics
            const url = 'https://api.lystit.com/count/powell-watson-toyota-wifi';
            
            fetch(url)
                .then(response => response.json())
                .then(data => {
                    if(data && data.count) {
                        document.getElementById('visits').textContent = data.count;
                    }
                })
                .catch(error => {
                    console.log('Counter update skipped; showing baseline.');
                });
        });
    </script>

</body>
</html>
