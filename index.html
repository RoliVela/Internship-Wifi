<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Toyota Wi-Fi Connect</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #0a0a0a;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
        }
        .card {
            background: #141414;
            padding: 35px 30px;
            border-radius: 16px;
            border: 1px solid #262626;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            text-align: center;
            max-width: 350px;
            width: 100%;
        }
        .logo-container {
            margin-bottom: 25px;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .logo-image {
            width: 120px; /* Adjust this value to make the logo larger or smaller */
            height: auto;
            object-fit: contain;
        }
        h2 {
            margin-top: 0;
            color: #ffffff;
            font-size: 22px;
            font-weight: 700;
            letter-spacing: -0.5px;
        }
        p {
            color: #a3a3a3;
            font-size: 14px;
            line-height: 1.5;
            margin-bottom: 28px;
        }
        .network-highlight {
            color: #ffffff;
            font-weight: 600;
        }
        .btn {
            background-color: #eb0a1e; /* Official Toyota Red */
            color: white;
            border: none;
            padding: 14px 28px;
            font-size: 16px;
            font-weight: 600;
            border-radius: 8px;
            cursor: pointer;
            width: 100%;
            transition: background-color 0.2s ease, transform 0.1s ease;
        }
        .btn:hover {
            background-color: #cc081a;
        }
        .btn:active {
            transform: scale(0.98);
        }
        .success-msg {
            color: #34c759;
            font-size: 14px;
            margin-top: 16px;
            display: none;
            font-weight: 500;
            animation: fadeIn 0.3s ease;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-5px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

    <div class="card">
        <div class="logo-container">
            <img src="https://upload.wikimedia.org/wikipedia/commons/e/ee/Toyota_Logo.png" alt="Toyota Logo" class="logo-image">
        </div>

        <h2>Welcome to Toyota</h2>
        <p>Tap the button below to copy the password, then connect to the <span class="network-highlight">Toyota Guest</span> network in your settings.</p>
        
        <button class="btn" onclick="copyPassword()">Copy Wi-Fi Password</button>
        <div id="success" class="success-msg">Password copied! Paste into settings.</div>
    </div>

    <script>
        function copyPassword() {
            const password = "Toyota2022"; 
            
            navigator.clipboard.writeText(password).then(() => {
                const successDiv = document.getElementById('success');
                successDiv.style.display = 'block';
                
                setTimeout(() => {
                    successDiv.style.display = 'none';
                }, 4000);
            }).catch(err => {
                alert('Oops, unable to copy automatically. Please type it manually.');
            });
        }
    </script>

</body>
</html>
